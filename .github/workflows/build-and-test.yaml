name: Build and Test
on:
  workflow_call:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  flatpak:
    name: Build and Test with Flatpak
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    strategy:
      matrix:
        arch:
          - x86_64
    #          - aarch64 not really needed yet. Enable when someone wants it.
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install deps
        if: ${{ matrix.arch != 'x86_64' }}
        run: |
          # Use the static binaries because it's unable to use a package manager 
          curl https://download.docker.com/linux/static/stable/x86_64/docker-26.0.0.tgz --output ./docker.tgz
          tar xzvf docker.tgz
          mv docker/* /usr/bin
      - name: Set up QEMU
        if: ${{ matrix.arch != 'x86_64' }}
        id: qemu
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: arm64
      - name: Run Lint on Manifest
        run: |
          flatpak-builder-lint manifest de.til7701.Puzzled.json
      - uses: flatpak/flatpak-github-actions/flatpak-builder@401fe28a8384095fc1531b9d320b292f0ee45adb # v6.7
        with:
          arch: ${{ matrix.arch }}
          manifest-path: de.til7701.Puzzled.json
          run-tests: true
          bundle: de.til7701.Puzzled_${{ github.sha }}_${{ matrix.arch }}.flatpak
      - name: Run Lint on Repo
        run: |
          flatpak-builder-lint repo repo || true
